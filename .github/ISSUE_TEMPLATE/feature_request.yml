name: 💡 Sugerencia o mejora
description: Una idea para el juego (nuevo modo, contenido, ajuste…)
title: "[Idea]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: ¿Qué te gustaría?
      placeholder: Un modo contrarreloj, un ranking semanal, sonidos nuevos…
    validations:
      required: true
  - type: textarea
    id: motivo
    attributes:
      label: ¿Por qué crees que mejoraría el juego?
    validations:
      required: false
